# VPS chatbot container — one per business
# Usage: docker-compose -p businessname -f docker-compose.chatbot.yml up -d

version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ${BUSINESS_SLUG}_ollama
    volumes:
      - ${BUSINESS_SLUG}_ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:${OLLAMA_PORT}:11434"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6G

  chatbot-api:
    build: ./chatbot-api
    container_name: ${BUSINESS_SLUG}_chatbot
    environment:
      - OLLAMA_URL=http://ollama:11434
      - MODEL_NAME=${MODEL_NAME:-gemma3:4b}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - API_KEY=${CHATBOT_API_KEY}
    ports:
      - "127.0.0.1:${CHATBOT_PORT}:8000"
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ${BUSINESS_SLUG}_ollama_data:
